<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICD-10 Ready Reference</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Segment -->
        <aside class="sidebar glass-panel">
            <header class="sidebar-header">
                <h1>ICD-10 Explorer</h1>
                <div class="search-container">
                    <span class="search-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </span>
                    <input type="text" id="search-input" placeholder="Search code, name, or description..." autocomplete="off">
                </div>
            </header>
            <div id="loading-indicator" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Loading Data...</p>
            </div>
            <div class="item-list-container">
                <ul id="icd-list" class="icd-list">
                    <!-- Items populated via JS -->
                </ul>
            </div>
        </aside>

        <!-- Main Content Segment -->
        <main class="main-content glass-panel" id="main-content">
            <!-- Default Welcome state -->
            <div class="welcome-message" id="welcome-message">
                <div class="welcome-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    </svg>
                </div>
                <h2>ICD-10 Ready Reference</h2>
                <p>Select a category from the left pane or use the search bar to explore codes.</p>
            </div>
            
            <!-- Details View State -->
            <div class="details-view hidden" id="details-view">
                <div class="details-header anim-fade-in-up">
                    <div class="badge" id="detail-code">Code</div>
                    <h2 id="detail-name">Name</h2>
                </div>
                
                <div class="details-body anim-fade-in-up" style="animation-delay: 0.1s;">
                    <div class="description-sect card glass-sub-panel">
                        <h3>Description</h3>
                        <div id="detail-description" class="desc-content"></div>
                    </div>
                </div>
                
                <div class="subtypes-container hidden anim-fade-in-up" id="subtypes-container" style="animation-delay: 0.2s;">
                    <h3>Sub-Types Evaluated</h3>
                    <div class="subtypes-grid" id="subtypes-grid">
                        <!-- Subtype cards populated here -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="data/icd_10.js"></script>
    <script src="script.js"></script>
</body>
</html>
